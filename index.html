<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>QUẢN LÝ KHU VỰC</title>

  <!-- Không giữ lại trang GitHub/iframe cũ -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest?v=14">
  <meta name="theme-color" content="#0ea5e9">

  <link rel="apple-touch-icon" href="./icon-192-any.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192-any.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512-any.png">

  <!-- Android / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QL Khu vực">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Tối ưu kết nối Google Apps Script -->
  <link rel="dns-prefetch" href="//script.google.com">
  <link rel="dns-prefetch" href="//script.googleusercontent.com">

  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>

  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100vh;
      min-height: 100dvh;

      padding:
        calc(24px + env(safe-area-inset-top))
        calc(24px + env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        calc(24px + env(safe-area-inset-left));

      background:
        radial-gradient(circle at top left, rgba(14,165,233,.24), transparent 38%),
        radial-gradient(circle at bottom right, rgba(16,185,129,.16), transparent 38%),
        #f3f6fb;

      color: #0f172a;

      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;

      -webkit-text-size-adjust: 100%;
    }

    .loading-card {
      width: min(420px, 100%);
      padding: 26px 22px;
      text-align: center;
      background: #fff;
      border: 1px solid #dbe4ef;
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(15,23,42,.14);
    }

    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 16px;
      padding: 8px;
      display: block;
      object-fit: contain;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(14,165,233,.22);
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 17px;
      border: 4px solid #dbeafe;
      border-top-color: #0284c7;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 21px;
      line-height: 1.35;
    }

    p {
      margin: 10px 0 18px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.55;
    }

    .open-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 18px;
      border-radius: 14px;
      background: #0284c7;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .open-button:active {
      transform: scale(.98);
    }

    .small-note {
      margin-top: 14px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main class="loading-card">
    <img class="logo" src="./evn_logo.png" alt="EVN">

    <div class="spinner" aria-hidden="true"></div>

    <h1>Đang mở Quản lý khu vực</h1>

    <p>
      Hệ thống đang chuyển trực tiếp đến Google Apps Script.
      Không sử dụng iframe nên không còn lỗi
      <b>ERR_BLOCKED_BY_RESPONSE</b>.
    </p>

    <a id="openAppButton" class="open-button" href="#">
      Mở ứng dụng ngay
    </a>

    <div class="small-note">
      Nếu ứng dụng chưa tự mở, anh bấm nút phía trên.
    </div>
  </main>

  <script>
    (function () {
      'use strict';

      var APP_URL = 'https://script.google.com/macros/s/AKfycbwIjlt_hIXaD9chA1Xl63ErUKo54i4mB7NXTgB5BwMf0JpM5jic-Ah5OX5yP57fsD_h/exec';

      /*
       * Giữ lại tham số khi APK/PWA mở từ thông báo:
       * ?open=notify&ref_id=123
       */
      var targetUrl =
        APP_URL +
        (window.location.search || '') +
        (window.location.hash || '');

      var button = document.getElementById('openAppButton');
      button.href = targetUrl;

      var redirected = false;

      function redirectToApp() {
        if (redirected) return;

        redirected = true;

        /*
         * Chuyển Apps Script thành trang chính.
         * Không dùng iframe.
         */
        window.location.replace(targetUrl);
      }

      function unregisterOldServiceWorkers() {
        if (!('serviceWorker' in navigator)) {
          return Promise.resolve();
        }

        return navigator.serviceWorker
          .getRegistrations()
          .then(function (registrations) {
            return Promise.all(
              registrations.map(function (registration) {
                return registration.unregister().catch(function () {
                  return false;
                });
              })
            );
          })
          .catch(function () {
            return null;
          });
      }

      function deleteOldCaches() {
        if (!('caches' in window)) {
          return Promise.resolve();
        }

        return caches.keys()
          .then(function (cacheNames) {
            return Promise.all(
              cacheNames.map(function (cacheName) {
                return caches.delete(cacheName).catch(function () {
                  return false;
                });
              })
            );
          })
          .catch(function () {
            return null;
          });
      }

      Promise.all([
        unregisterOldServiceWorkers(),
        deleteOldCaches()
      ]).then(
        redirectToApp,
        redirectToApp
      );

      // Dự phòng WebView cũ xử lý Promise chậm.
      window.setTimeout(redirectToApp, 1200);
    })();
  </script>
</body>
</html>
